<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物流关务术语库</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- 头部 -->
    <header class="app-header">
      <div class="header-left">
        <h1><i class="fas fa-book"></i> 物流关务术语库</h1>
        <span id="stats" class="stats-text">共 0 条术语 · 0 个分类</span>
      </div>
      <div class="header-right">
        <button id="addCategoryBtn" class="btn btn-outline"><i class="fas fa-tags"></i> 分类管理</button>
        <button id="exportBtn" class="btn btn-outline"><i class="fas fa-download"></i> 导出</button>
        <button id="addTermBtn" class="btn btn-primary"><i class="fas fa-plus"></i> 添加术语</button>
      </div>
    </header>

    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索术语、缩写、全拼或解释..." />
        <button id="clearSearch" class="btn-clear" title="清除搜索"><i class="fas fa-times"></i></button>
      </div>
      <div class="filter-group">
        <select id="categoryFilter" class="select-filter">
          <option value="">全部分类</option>
        </select>
      </div>
      <div class="batch-actions">
        <span id="selectedCount" class="selected-count">0</span>
        <button id="batchDeleteBtn" class="btn btn-danger btn-sm" style="display:none"><i class="fas fa-trash"></i> 批量删除</button>
      </div>
    </div>

    <!-- 表格 -->
    <div class="table-wrapper">
      <table id="termTable">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="selectAll" /></th>
            <th data-sort="term" class="sortable">术语 <i class="fas fa-sort"></i></th>
            <th data-sort="abbreviation" class="sortable">缩写 <i class="fas fa-sort"></i></th>
            <th data-sort="fullName" class="sortable">全拼 <i class="fas fa-sort"></i></th>
            <th data-sort="category" class="sortable">分类 <i class="fas fa-sort"></i></th>
            <th>解释</th>
            <th data-sort="createdAt" class="sortable">添加时间 <i class="fas fa-sort"></i></th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody id="termBody"></tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none">
        <i class="fas fa-inbox"></i>
        <p>暂无术语数据</p>
        <span class="hint">点击"添加术语"按钮开始添加</span>
      </div>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="pagination"></div>
  </div>

  <!-- 添加/编辑术语弹窗 -->
  <div id="termModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">添加术语</h3>
        <button id="closeTermModal" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <form id="termForm" class="modal-body">
        <input type="hidden" id="termId" />
        <div class="form-group">
          <label for="termName">术语名称 <span class="required">*</span></label>
          <input type="text" id="termName" placeholder="如：提单" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="termAbbr">英文缩写</label>
            <input type="text" id="termAbbr" placeholder="如：B/L" />
          </div>
          <div class="form-group">
            <label for="termFullName">英文全拼</label>
            <input type="text" id="termFullName" placeholder="如：Bill of Lading" />
          </div>
        </div>
        <div class="form-group">
          <label for="termCategory">分类</label>
          <select id="termCategory" class="select-filter">
            <option value="">未分类</option>
          </select>
        </div>
        <div class="form-group">
          <label for="termDesc">解释</label>
          <textarea id="termDesc" rows="3" placeholder="输入术语的详细解释..."></textarea>
        </div>
      </form>
      <div class="modal-footer">
        <button id="cancelTermModal" class="btn btn-outline">取消</button>
        <button id="saveTermModal" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 分类管理弹窗 -->
  <div id="categoryModal" class="modal">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h3>分类管理</h3>
        <button id="closeCategoryModal" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="add-category-row">
          <input type="text" id="newCategoryInput" placeholder="输入新分类名称..." />
          <button id="addCategoryConfirm" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 添加</button>
        </div>
        <ul id="categoryList" class="category-list"></ul>
      </div>
      <div class="modal-footer">
        <button id="closeCategoryModalBtn" class="btn btn-outline">关闭</button>
      </div>
    </div>
  </div>

  <!-- 导出弹窗 -->
  <div id="exportModal" class="modal">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h3>导出数据</h3>
        <button id="closeExportModal" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="export-scope">
          <h4>导出范围</h4>
          <label class="radio-label"><input type="radio" name="exportScope" value="all" checked /> 全部术语</label>
          <label class="radio-label"><input type="radio" name="exportScope" value="filtered" /> 当前筛选结果</label>
          <label class="radio-label"><input type="radio" name="exportScope" value="selected" /> 已选中的术语</label>
        </div>
        <div class="export-format">
          <h4>导出格式</h4>
          <div class="export-options">
            <div id="exportJSON" class="export-option selected">
              <i class="fas fa-file-code"></i>
              <span>JSON</span>
            </div>
            <div id="exportCSV" class="export-option">
              <i class="fas fa-file-csv"></i>
              <span>CSV</span>
            </div>
            <div id="exportExcel" class="export-option">
              <i class="fas fa-file-excel"></i>
              <span>Excel</span>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeExportModalBtn" class="btn btn-outline">取消</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div id="confirmModal" class="modal">
    <div class="modal-content modal-xs">
      <div class="modal-header">
        <h3 id="confirmTitle">确认操作</h3>
        <button id="closeConfirmModal" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="cancelConfirm" class="btn btn-outline">取消</button>
        <button id="confirmAction" class="btn btn-danger">确认</button>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
